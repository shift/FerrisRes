name: researcher-kv-cache
agent_type: researcher
specialization: KV cache correctness and incremental decode analysis
email: null
created_at: 2026-04-09
version: 1.0.0
capabilities:
- memory_storage
- task_management
- context_tracking
- reasoning_chains
- knowledge_graph
- team_collaboration
commands:
- engram task create --title "Task Title" --agent researcher-kv-cache
- engram context create --source "documentation" --agent researcher-kv-cache
- engram reasoning create --task-id "task-123" --agent researcher-kv-cache
- engram sync --agents "agent1,agent2" --strategy "merge_with_conflict_resolution"
workspace_access:
  repositories:
  - ./
  tools:
  - git
  - rust
  - cargo

name: implementer-scenario
agent_type: tester
specialization: Rust integration and scenario testing
email: null
created_at: 2026-04-09
version: 1.0.0
capabilities:
- memory_storage
- task_management
- context_tracking
- reasoning_chains
- knowledge_graph
- team_collaboration
commands:
- engram task create --title "Task Title" --agent implementer-scenario
- engram context create --source "documentation" --agent implementer-scenario
- engram reasoning create --task-id "task-123" --agent implementer-scenario
- engram sync --agents "agent1,agent2" --strategy "merge_with_conflict_resolution"
workspace_access:
  repositories:
  - ./
  tools:
  - git
  - rust
  - cargo

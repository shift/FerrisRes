name: benchmark-turboquant
agent_type: coder
specialization: TurboQuant performance analysis and benchmarking
email: null
created_at: 2026-04-11
version: 1.0.0
capabilities:
- memory_storage
- task_management
- context_tracking
- reasoning_chains
- knowledge_graph
- team_collaboration
commands:
- engram task create --title "Task Title" --agent benchmark-turboquant

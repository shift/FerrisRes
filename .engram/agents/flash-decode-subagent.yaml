name: flash-decode-subagent
agent_type: coder
specialization: GPU compute kernels and decode-phase inference
email: null
created_at: 2026-04-08
version: 1.0.0
capabilities:
- memory_storage
- task_management
- context_tracking
- reasoning_chains
- knowledge_graph
- team_collaboration
commands:
- engram task create --title "Task Title" --agent flash-decode-subagent
